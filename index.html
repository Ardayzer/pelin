<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta name="format-detection" content="telephone=no, date=no, address=no, email=no" />
<meta name="x-apple-disable-message-reformatting" />
<title>my.tedu.edu.tr</title>
<link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="phone">
    <!-- Page header -->
    <header class="page-header" id="pageHeader">
      <div class="header-left">
        <button class="back-btn hidden" id="backBtn" aria-label="back">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="#3b5878" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 6 9 12 15 18"/></svg>
        </button>
        <button class="home-btn hidden" id="homeBtn" aria-label="home">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="#3b5878" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11l9-8 9 8"/><path d="M5 10v10h14V10"/></svg>
        </button>
        <div class="title-pill" id="titlePill">
          <span id="titleText">Home</span>
          <svg class="caret" viewBox="0 0 10 6" width="10" height="6" fill="#3b5878"><polygon points="0,0 10,0 5,6"/></svg>
        </div>
      </div>
      <div class="header-right">
        <button class="icon-btn" aria-label="search">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="#3b5878" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><line x1="20" y1="20" x2="16.5" y2="16.5"/></svg>
        </button>
        <button class="avatar-btn" id="avatarBtn" aria-label="profile">
          <img src="pp.png.jpeg" alt="" class="avatar"/>
        </button>
      </div>
    </header>

    <!-- Profile dropdown -->
    <div class="profile-pop hidden" id="profilePop">
      <div class="profile-name">MERT AKTAŞ</div>
      <div class="profile-divider"></div>
      <button class="signout">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="#3b5878" stroke-width="2" stroke-linecap="round"><path d="M12 3v9"/><path d="M6.3 6.3a8 8 0 1011.4 0"/></svg>
        <span>Sign Out</span>
      </button>
    </div>

    <!-- Main scroll area -->
    <main class="content" id="content">
      <!-- HOME PAGE -->
      <section class="page page-home active" id="page-home">
        <div class="tab-row">
          <div class="tab active">Student Employment</div>
          <div class="tab-caret">
            <svg viewBox="0 0 10 6" width="12" height="7" fill="#9aa6b2"><polygon points="0,0 10,0 5,6"/></svg>
          </div>
        </div>
        <div class="tab-underline"></div>

        <div class="tile-grid">
          <button class="tile" data-target="page-students">
            <div class="tile-title">Timesheet Entry</div>
            <div class="tile-sub">Student Part Time E...</div>
            <div class="tile-icon">
              <img src="timesheet.png" alt="" class="icon-img"/>
            </div>
          </button>

          <button class="tile">
            <div class="tile-title">"How to?" Video Guides</div>
            <div class="tile-sub">Student Timesheet E...</div>
            <div class="tile-icon">
              <img src="help.png" alt="" class="icon-img"/>
            </div>
          </button>
        </div>

        <div class="section-title">Internship</div>

        <div class="tile-grid">
          <button class="tile">
            <div class="tile-title">Applications</div>
            <div class="tile-sub">Internship Applications</div>
            <div class="tile-foot tile-foot-combo">
              <img src="applications.png" alt="" class="icon-combo"/>
            </div>
            <div class="tile-foot-text">applications</div>
          </button>

          <button class="tile">
            <div class="tile-title">Working Day Calculator</div>
            <div class="tile-sub">Internship</div>
            <div class="tile-icon">
              <img src="calculator.png" alt="" class="icon-img"/>
            </div>
          </button>

          <button class="tile">
            <div class="tile-title">Internship Companies</div>
            <div class="tile-sub">Display and create n...</div>
            <div class="tile-foot tile-foot-combo">
              <img src="companies.png" alt="" class="icon-combo"/>
            </div>
          </button>

          <button class="tile placeholder"></button>
        </div>

        <div class="section-title">My Tools</div>

        <div class="tile-grid">
          <button class="tile">
            <div class="tile-title">My Profile</div>
            <div class="tile-sub">Personal Information</div>
            <div class="tile-icon">
              <svg viewBox="0 0 40 40" width="42" height="42" fill="none" stroke="#7a96b3" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="20" cy="14" r="6" fill="#7a96b3" stroke="none"/>
                <path d="M6 34c0-7.5 6-12 14-12s14 4.5 14 12z" fill="#7a96b3" stroke="none"/>
              </svg>
            </div>
          </button>

          <button class="tile">
            <div class="tile-title">My Timetable</div>
            <div class="tile-sub">Weekly Schedule</div>
            <div class="tile-icon">
              <svg viewBox="0 0 40 40" width="42" height="42" fill="none" stroke="#7a96b3" stroke-width="1.6" stroke-linejoin="round">
                <rect x="5" y="8" width="30" height="26" rx="2"/>
                <line x1="5" y1="15" x2="35" y2="15" stroke-width="1.6"/>
                <line x1="12" y1="5" x2="12" y2="11" stroke-width="1.8" stroke-linecap="round"/>
                <line x1="28" y1="5" x2="28" y2="11" stroke-width="1.8" stroke-linecap="round"/>
                <line x1="13" y1="22" x2="33" y2="22" stroke-width="1.2"/>
                <line x1="13" y1="28" x2="33" y2="28" stroke-width="1.2"/>
                <line x1="13" y1="18" x2="13" y2="32" stroke-width="1.2"/>
                <line x1="20" y1="18" x2="20" y2="32" stroke-width="1.2"/>
                <line x1="27" y1="18" x2="27" y2="32" stroke-width="1.2"/>
              </svg>
            </div>
          </button>
        </div>

        <div class="tile-grid">
          <button class="tile">
            <div class="tile-title">My Courses</div>
            <div class="tile-sub">Enrolled Courses</div>
            <div class="tile-icon">
              <svg viewBox="0 0 40 40" width="42" height="42" fill="none" stroke="#7a96b3" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
                <path d="M5 10c5-2 10-2 15 0v22c-5-2-10-2-15 0z"/>
                <path d="M35 10c-5-2-10-2-15 0v22c5-2 10-2 15 0z"/>
                <line x1="20" y1="10" x2="20" y2="32"/>
              </svg>
            </div>
          </button>

          <button class="tile">
            <div class="tile-title">My Grades</div>
            <div class="tile-sub">Course Grades</div>
            <div class="tile-icon">
              <svg viewBox="0 0 40 40" width="42" height="42" fill="none" stroke="#7a96b3" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
                <path d="M20 5l4 8 9 1.3-6.5 6.4 1.5 9-8-4.2-8 4.2 1.5-9L7 14.3l9-1.3z" fill="#7a96b3" stroke="none"/>
              </svg>
            </div>
          </button>
        </div>

        <div class="tile-grid">
          <button class="tile">
            <div class="tile-title">My Transcript</div>
            <div class="tile-sub">Academic Record</div>
            <div class="tile-icon">
              <svg viewBox="0 0 40 40" width="42" height="42" fill="none" stroke="#7a96b3" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
                <path d="M9 5h17l5 5v25H9z"/>
                <path d="M26 5v5h5"/>
                <line x1="13" y1="17" x2="27" y2="17" stroke-width="1.4"/>
                <line x1="13" y1="22" x2="27" y2="22" stroke-width="1.4"/>
                <line x1="13" y1="27" x2="22" y2="27" stroke-width="1.4"/>
              </svg>
            </div>
          </button>

          <button class="tile">
            <div class="tile-title">Announcements</div>
            <div class="tile-sub">Latest News</div>
            <div class="tile-icon">
              <svg viewBox="0 0 40 40" width="42" height="42" fill="none" stroke="#7a96b3" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
                <path d="M20 8c0-3.3 2.7-6 6-6v32c-3.3 0-6-2.7-6-6z" fill="#7a96b3" stroke="none"/>
                <path d="M20 12H10a3 3 0 00-3 3v6a3 3 0 003 3h10z"/>
                <path d="M12 24v6a2 2 0 004 0v-6"/>
                <path d="M30 14h4M30 20h5M30 26h4"/>
              </svg>
            </div>
          </button>
        </div>
      </section>

      <!-- STUDENT INFO CENTER -->
      <section class="page page-students" id="page-students">
        <div class="students-title">Students</div>
        <div class="search-wrap">
          <input class="search" placeholder="Search" />
          <span class="search-icon">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="#3b5878" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><line x1="20" y1="20" x2="16.5" y2="16.5"/></svg>
          </span>
        </div>
        <div class="group-label">Computer Engineering (50%)</div>
        <div class="student-row">
          <div class="student-info">
            <div class="student-name">AKTAŞ, MERT</div>
            <div class="student-id">12426098080</div>
            <div class="student-dept">Computer Engineering (50%)</div>
          </div>
          <div class="student-meta">
            <div class="year">4. Year</div>
            <div class="status">Attending</div>
          </div>
        </div>
      </section>
    </main>

    <!-- Filter footer (only on students page) -->
    <div class="filter-bar hidden" id="filterBar">
      <button class="filter-btn" aria-label="filter">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="#cdd5dd" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 5h16l-6 8v6l-4-2v-4z"/></svg>
      </button>
    </div>

  </div>

  <script src="app.js"></script>
</body>
</html>
